<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel Transformer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

  <main class="page-wrapper">
    <div class="card">

      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>

      <h1 class="card-title">تحويل ملف Excel</h1>
      <p class="card-subtitle">ارفع ملفك وسنقوم بتحويله فوراً</p>

      <label class="drop-zone" for="upload">
        <span class="drop-icon">📂</span>
        <span class="drop-text">
          <strong>اختر ملف Excel</strong> أو اسحبه هنا
        </span>
        <span class="drop-hint">.xlsx &middot; .xls &middot; .csv</span>
        <input type="file" id="upload" accept=".xlsx,.xls,.csv" />
      </label>

      <div class="file-name" id="fileName">لم يتم اختيار ملف</div>

      <button class="btn-convert" onclick="processFile()">
        تحويل الملف
      </button>

    </div>
  </main>

  <footer class="footer">
    صُمِّم بواسطة
    <a href="https://www.facebook.com/mohamed.mohi.904" target="_blank" rel="noopener">
      محمد محي
    </a>
  </footer>

  <!-- <script src="script.js"></script> -->
</body>
</html>
